name: Build Windows installer

# Genera el instalador .exe en un runner de Windows en la nube (sin Smart App Control,
# así OR-Tools se empaqueta de forma nativa). Se dispara al hacer push a main, al crear
# un tag vX.Y.Z, o manualmente desde la pestaña Actions de GitHub.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias del solver
        run: |
          python -m pip install --upgrade pip
          pip install -r solver/requirements.txt

      - name: Empaquetar el solver con PyInstaller (OR-Tools nativo)
        working-directory: solver
        run: pyinstaller --noconfirm solver_ipc.spec --distpath dist --workpath build

      - name: Generar el icono de la app
        run: |
          pip install Pillow
          python scripts/make_icon.py

      - name: Instalar dependencias de Node
        run: npm ci

      - name: Construir el instalador (electron-builder)
        # --publish never: solo construir el .exe, sin intentar publicarlo en un release
        # (lo descargamos como artefacto). El auto-publish/auto-update es una fase posterior.
        run: npm run build:win -- --publish never
        env:
          # Sin certificado => build sin firmar (SmartScreen mostrará "editor desconocido").
          # Para firmar, agrega los secrets CSC_LINK y CSC_KEY_PASSWORD en GitHub.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Subir el instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: From-Schedule-FI-Windows
          path: |
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: error
